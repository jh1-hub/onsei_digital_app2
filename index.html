<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音のデジタル化実験室 (SoundBit)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        cyan: {
                            500: '#06b6d4',
                            600: '#0891b2',

                    },
                    fontFamily: {
                        mono: ['"Fira Code"', 'Monaco', 'Consolas', '"Courier New"', 'monospace'],
                    }
                }
            }
        }

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone (for JSX in browser) -->

    <!-- Google Fonts for Coding display -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

<body class="bg-slate-50 text-slate-800 min-h-screen selection:bg-cyan-200 selection:text-cyan-900">
    <div id="root"></div>
